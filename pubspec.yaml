name: friendly_net
description: FriendlyNET — Partage Internet coopératif entre amis, sans frontières.
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ─── Moteur réseau BufferWave (API commune VPN) ───
  bufferwave_core:
    git:
      url: https://github.com/Klein241/bufferwave-core.git
      ref: main

  # ─── WiFi Direct P2P réel (Hotspot + BLE discovery) ───
  flutter_p2p_connection:
    path: ../Documents/tailscale-main pour réseau/flutter_p2p_connection-main

  # ─── État global ───
  provider: ^6.1.2

  # ─── Réseau ───
  web_socket_channel: ^3.0.0
  http: ^1.2.0

  # ─── Persistance ───
  shared_preferences: ^2.2.0

  # ─── Système ───
  connectivity_plus: ^5.0.2
  permission_handler: ^11.0.0
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0

  # ─── Sécurité E2E ───
  # X25519 ECDH + AES-256-GCM pour chiffrement pairs
  cryptography: ^2.7.0

  # ─── Monitoring & Logs ───
  logger: ^2.4.0

  # ─── Notifications ───
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
